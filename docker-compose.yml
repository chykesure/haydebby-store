version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: haydebby-store
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/db/custom.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-to-a-random-secret}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NODE_ENV=production
    volumes:
      # Persist the SQLite database
      - app-data:/app/db
      # Persist uploaded product images
      - uploads-data:/app/public/images/products
      - uploads-data:/app/public/images/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  app-data:
    driver: local
  uploads-data:
    driver: local
